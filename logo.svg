<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Hexagon -->
  <polygon points="100,20 160,55 160,125 100,160 40,125 40,55"
           stroke="#00ADD8"
           stroke-width="6"
           fill="none"/>

  <!-- Animated connections -->
  <line x1="100" y1="60" x2="70" y2="110"
        stroke="#00ADD8" stroke-width="3"
        stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset"
             from="0" to="10"
             dur="1s"
             repeatCount="indefinite"/>
  </line>

  <line x1="100" y1="60" x2="130" y2="110"
        stroke="#00ADD8" stroke-width="3"
        stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset"
             from="0" to="10"
             dur="1s"
             repeatCount="indefinite"/>
  </line>

  <line x1="70" y1="110" x2="130" y2="110"
        stroke="#00ADD8" stroke-width="3"
        stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset"
             from="0" to="10"
             dur="1s"
             repeatCount="indefinite"/>
  </line>

  <!-- Nodes -->
  <circle cx="100" cy="60" r="6" fill="#00ADD8"/>
  <circle cx="70" cy="110" r="5" fill="#00ADD8"/>
  <circle cx="130" cy="110" r="5" fill="#00ADD8"/>

  <!-- Central node with pulse -->
  <circle cx="100" cy="95" r="8" fill="#00ADD8">
    <animate attributeName="r"
             values="8;11;8"
             dur="1.5s"
             repeatCount="indefinite"/>
  </circle>

</svg>